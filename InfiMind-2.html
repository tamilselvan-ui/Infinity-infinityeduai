<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>InfiMind</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0A0B12;
    --surface:#12141F;
    --line:#23263A;
    --field:#0F1119;
    --ink:#ECEEF6;
    --silver:#C7CBDA;
    --mute:#6B7086;
    --mute2:#B7BBCC;
    --blue:#3C9CFF;
    --violet:#8B5CF6;
    --grad:linear-gradient(90deg,#3C9CFF,#8B5CF6);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--void);color:var(--ink);font-family:'Manrope',sans-serif;}
  button{font-family:inherit;}
  input:focus{border-color:var(--blue) !important;}

  .ambient{position:fixed;pointer-events:none;filter:blur(40px);z-index:0;}
  .ambient.a{top:-10%;left:-10%;width:420px;height:420px;background:radial-gradient(circle, rgba(60,156,255,0.16) 0%, transparent 70%);}
  .ambient.b{bottom:-15%;right:-10%;width:480px;height:480px;background:radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 70%);}

  .brand-plate{display:inline-flex;align-items:center;justify-content:center;background:#F4F5FA;border-radius:18px;padding:16px 26px;box-shadow:0 10px 34px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.04);}
  .brand-plate.compact{padding:9px 16px;border-radius:13px;}
  .brand-plate img{display:block;width:260px;height:auto;}
  .brand-plate.compact img{width:150px;}
  .star{display:inline-flex;}

  .container{position:relative;z-index:1;max-width:640px;margin:0 auto;padding-bottom:60px;}

  .key-btn{position:absolute;top:18px;right:18px;width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:var(--mute2);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;}
  .key-btn svg{width:16px;height:16px;}
  .key-modal{position:fixed;inset:0;background:rgba(4,5,10,0.72);display:flex;align-items:center;justify-content:center;padding:24px;z-index:10;}
  .key-modal-card{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:24px;display:flex;flex-direction:column;gap:14px;}
  .key-modal-title{font-weight:800;font-size:1.02rem;}
  .key-modal-sub{font-size:0.8rem;color:var(--mute);line-height:1.5;}
  .key-modal-card input{background:var(--field);border:1px solid var(--line);border-radius:10px;padding:12px 14px;color:var(--ink);font-size:0.9rem;outline:none;font-family:'Manrope',sans-serif;width:100%;}
  .key-modal-actions{display:flex;gap:10px;margin-top:4px;}
  .key-modal-actions button{flex:1;padding:11px 0;border-radius:9px;font-weight:700;font-size:0.85rem;cursor:pointer;}
  .key-cancel{border:1px solid var(--line);background:transparent;color:var(--mute2);}
  .key-save{border:none;background:var(--grad);color:#0A0B12;}
  .key-modal-note{font-size:0.72rem;color:var(--mute);}

  .center-screen{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
  .onboard-card{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:28px;display:flex;flex-direction:column;gap:18px;}
  .onboard-title{font-weight:800;font-size:1.1rem;}
  .onboard-sub{font-size:0.82rem;color:var(--mute);margin-top:4px;}

  .field{display:flex;flex-direction:column;gap:6px;}
  .field-label{font-weight:700;font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--mute);}
  .field input{background:var(--field);border:1px solid var(--line);border-radius:10px;padding:12px 14px;color:var(--ink);font-size:0.95rem;outline:none;font-family:'Manrope',sans-serif;}

  .btn-primary{margin-top:6px;padding:13px 0;border-radius:10px;border:none;font-weight:700;font-size:0.92rem;color:#0A0B12;background:var(--grad);cursor:pointer;width:100%;}
  .btn-primary[disabled]{color:var(--mute);background:#1A1C29;cursor:not-allowed;}

  .header{display:flex;flex-direction:column;align-items:center;gap:14px;padding:28px 20px 22px;}
  .header-greet{text-align:center;}
  .header-name{font-weight:800;font-size:1.15rem;}
  .header-school{font-size:0.78rem;color:var(--mute);margin-top:2px;}

  .crumbs{padding:0 20px 20px;display:flex;align-items:center;flex-wrap:wrap;gap:8px;font-size:0.8rem;}
  .crumb-btn{background:none;border:none;padding:0;cursor:default;color:var(--mute);font-weight:500;}
  .crumb-btn.enabled{cursor:pointer;}
  .crumb-btn.current{color:var(--ink);font-weight:700;}

  .section-title{font-weight:800;font-size:1rem;color:var(--ink);}
  .stage-pad{padding:10px 20px;}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px;}
  .list-col{display:flex;flex-direction:column;gap:10px;margin-top:14px;}

  .card{text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 18px;color:var(--ink);cursor:pointer;transition:border-color .15s, background .15s;width:100%;}
  .card.active{background:rgba(60,156,255,0.08);border-color:var(--blue);}
  .card-title-lg{font-family:'Orbitron',sans-serif;font-weight:700;font-size:1.4rem;}
  .card-sub{font-size:0.78rem;color:var(--mute);margin-top:4px;}
  .card-title-md{font-weight:700;font-size:0.98rem;}
  .card-sub2{font-size:0.76rem;color:var(--mute);margin-top:4px;}
  .chapter-row{display:flex;gap:12px;align-items:baseline;}
  .chapter-num{font-family:'Orbitron',sans-serif;font-size:0.72rem;color:var(--mute);min-width:22px;}
  .chapter-name{font-size:0.92rem;}

  .btn-generate{margin-top:20px;width:100%;padding:14px 0;border-radius:10px;border:none;font-weight:700;font-size:0.92rem;display:flex;align-items:center;justify-content:center;gap:8px;color:#0A0B12;background:var(--grad);cursor:pointer;}
  .btn-generate[disabled]{color:var(--mute);background:#1A1C29;cursor:not-allowed;}

  .notes-panel{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px;min-height:200px;}
  .loading-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:40px 0;}
  .loading-text{font-size:0.82rem;color:var(--mute);}
  .spin{animation:spinner 1.1s linear infinite;}
  @keyframes spinner{to{transform:rotate(360deg);}}

  .error-wrap{text-align:center;padding:30px 0;}
  .error-text{font-size:0.9rem;color:var(--mute2);margin-bottom:16px;}
  .btn-retry{padding:10px 20px;border-radius:8px;border:1px solid var(--blue);background:transparent;color:var(--blue);font-weight:700;cursor:pointer;}

  .notes h2{font-family:'Orbitron',sans-serif;font-weight:700;font-size:1.3rem;letter-spacing:0.02em;color:var(--ink);margin:0 0 14px;}
  .notes h3{font-weight:800;font-size:1.15rem;color:var(--ink);margin:26px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--line);}
  .notes h4{font-weight:800;font-size:0.95rem;color:var(--ink);margin:18px 0 6px;}
  .notes p{font-size:0.94rem;line-height:1.7;color:var(--mute2);margin:0 0 12px;}
  .notes ul, .notes ol{margin:0 0 12px;padding-left:20px;display:flex;flex-direction:column;gap:6px;}
  .notes li{font-size:0.94rem;line-height:1.6;color:var(--mute2);}
  .notes strong{color:var(--ink);font-weight:700;}

  .actions-row{display:flex;gap:10px;margin-top:16px;}
  .btn-secondary{flex:1;padding:12px 0;border-radius:10px;border:1px solid var(--line);background:transparent;color:var(--mute2);font-weight:700;font-size:0.85rem;cursor:pointer;}
  .btn-regenerate{flex:1;padding:12px 0;border-radius:10px;border:none;background:var(--grad);color:#0A0B12;font-weight:700;font-size:0.85rem;cursor:pointer;}

  @media (max-width:420px){
    .brand-plate img{width:200px;}
    .brand-plate.compact img{width:130px;}
  }
</style>
</head>
<body>

<div class="ambient a"></div>

function logoHTML(compact){
  return `
    <div class="brand-plate ${compact ? "compact" : ""}">
      <img src="${LOGO_URI}" alt="Infinity Edu AI" />
    </div>`;
}

function escapeHTML(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function inlineMd(line){
  const escaped = escapeHTML(line);
  return escaped.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
}

/* tiny markdown renderer -> returns HTML string */
function renderNotes(text){
  const lines = text.split("\n");
  let html = "";
  let list = null; // {type, items}

  const flush = () => {
    if (list) {
      const tag = list.type === "ol" ? "ol" : "ul";
      html += `<${tag}>` + list.items.map(it => `<li>${inlineMd(it)}</li>`).join("") + `</${tag}>`;
      list = null;
    }
  };

  lines.forEach(raw => {
    const line = raw.trim();
    if (!line) { flush(); return; }
    if (line.startsWith("### ")) { flush(); html += `<h4>${inlineMd(line.slice(4))}</h4>`; }
    else if (line.startsWith("## ")) { flush(); html += `<h3>${inlineMd(line.slice(3))}</h3>`; }
    else if (line.startsWith("# ")) { flush(); html += `<h2>${inlineMd(line.slice(2))}</h2>`; }
    else if (/^(-|\*)\s+/.test(line)) {
      if (!list || list.type !== "ul") { flush(); list = { type: "ul", items: [] }; }
      list.items.push(line.replace(/^(-|\*)\s+/, ""));
    } else if (/^\d+\.\s+/.test(line)) {
      if (!list || list.type !== "ol") { flush(); list = { type: "ol", items: [] }; }
      list.items.push(line.replace(/^\d+\.\s+/, ""));
    } else {
      flush();
      html += `<p>${inlineMd(line)}</p>`;
    }
  });
  flush();
  return html;
}

/* ---------------- render ---------------- */
function render(){
  if (state.stage === "onboard") {
    app.innerHTML = `
      <div class="center-screen">
        <div style="margin-bottom:36px;">${logoHTML(false)}</div>
        <div class="onboard-card">
          <div>
            <div class="onboard-title">Let's set you up</div>
            <div class="onboard-sub">A few details so your notes feel personal.</div>
          </div>
          <div class="field">
            <span class="field-label">Name</span>
            <input id="in-name" type="text" placeholder="e.g. Tamil" value="${escapeHTML(state.name)}" />
          </div>
          <div class="field">
            <span class="field-label">Mobile Number</span>
            <input id="in-mobile" type="tel" placeholder="10-digit number" value="${escapeHTML(state.mobile)}" />
          </div>
          <div class="field">
            <span class="field-label">School Name</span>
            <input id="in-school" type="text" placeholder="e.g. St. Xavier's" value="${escapeHTML(state.school)}" />
          </div>
          <button class="btn-primary" id="btn-enter" ${canEnter() ? "" : "disabled"}>Enter InfiMind</button>
        </div>
      </div>`;

    const nameEl = document.getElementById("in-name");
    const mobileEl = document.getElementById("in-mobile");
    const schoolEl = document.getElementById("in-school");
    const btn = document.getElementById("btn-enter");

    const sync = () => {
      state.name = nameEl.value;
      state.mobile = mobileEl.value;
      state.school = schoolEl.value;
      btn.disabled = !canEnter();
    };
    nameEl.addEventListener("input", sync);
    mobileEl.addEventListener("input", sync);
    schoolEl.addEventListener("input", sync);
    btn.addEventListener("click", () => { if (canEnter()) { state.stage = "class"; render(); } });
    return;
  }

  // post-onboarding shell
  let body = "";

  const crumbItems = [
    { label: state.cls ? `Class ${state.cls}` : "Class", enabled: !!state.cls, jump: 0 },
  ];
  if (state.cls) crumbItems.push({ label: state.subject || "Subject", enabled: !!state.subject, jump: 1 });
  if (state.subject) crumbItems.push({ label: state.chapter || "Chapter", enabled: !!state.chapter, jump: 2 });

  const crumbsHTML = state.stage !== "class" ? `
    <div class="crumbs">
      ${crumbItems.map((it, i) => `
        ${i > 0 ? starSVG(8) : ""}
        <button class="crumb-btn ${it.enabled ? "enabled" : ""} ${i === crumbItems.length - 1 ? "current" : ""}" data-jump="${it.jump}">${escapeHTML(it.label)}</button>
      `).join("")}
    </div>` : "";

  if (state.stage === "class") {
    body = `
      <div class="stage-pad">
        <div class="section-title">Choose your class</div>
        <div class="grid2">
          ${[10, 12].map(c => `
            <button class="card ${state.cls === c ? "active" : ""}" data-class="${c}">
              <div class="card-title-lg">${c}</div>
              <div class="card-sub">Class ${c} · CBSE</div>
            </button>`).join("")}
        </div>
      </div>`;
  } else if (state.stage === "subject") {
    body = `
      <div class="stage-pad">
        <div class="section-title">Class ${state.cls} · pick a subject</div>
        <div class="grid2">
          ${Object.keys(SYLLABUS[state.cls]).map(s => `
            <button class="card ${state.subject === s ? "active" : ""}" data-subject="${escapeHTML(s)}">
              <div class="card-title-md">${escapeHTML(s)}</div>
              <div class="card-sub2">${SYLLABUS[state.cls][s].length} chapters</div>
            </button>`).join("")}
        </div>
      </div>`;
  } else if (state.stage === "chapter") {
    body = `
      <div class="stage-pad">
        <div class="section-title">${escapeHTML(state.subject)} · NCERT chapters</div>
        <div class="list-col">
          ${SYLLABUS[state.cls][state.subject].map((ch, i) => `
            <button class="card ${state.chapter === ch ? "active" : ""}" data-chapter="${escapeHTML(ch)}">
              <div class="chapter-row">
                <span class="chapter-num">${String(i + 1).padStart(2, "0")}</span>
                <span class="chapter-name">${escapeHTML(ch)}</span>
              </div>
            </button>`).join("")}
        </div>
        <button class="btn-generate" id="btn-generate" ${state.chapter ? "" : "disabled"}>
          ${starSVG(13)} Generate Notes
        </button>
      </div>`;
  } else if (state.stage === "notes") {
    body = `
      <div class="stage-pad">
        <div class="notes-panel">
          ${state.loading ? `
            <div class="loading-wrap">
              <div class="spin">${starSVG(22)}</div>
              <div class="loading-text">Writing your notes on “${escapeHTML(state.chapter)}”…</div>
            </div>` : ""}
          ${!state.loading && state.error ? `
            <div class="error-wrap">
              <div class="error-text">${escapeHTML(state.error)}</div>
              <button class="btn-retry" id="btn-retry">Try again</button>
            </div>` : ""}
          ${!state.loading && !state.error && state.notesText ? `<div class="notes">${renderNotes(state.notesText)}</div>` : ""}
        </div>
        <div class="actions-row">
          <button class="btn-secondary" id="btn-back-chapters">Back to chapters</button>
          ${!state.loading && state.notesText ? `<button class="btn-regenerate" id="btn-regenerate">Regenerate</button>` : ""}
        </div>
      </div>`;
  }

  app.innerHTML = `
    <div class="container">
      <button class="key-btn" id="btn-key" title="API key settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
      </button>
      <div class="header">
        ${logoHTML(true)}
        <div class="header-greet">
          <div class="header-name">Hi, ${escapeHTML(state.name.split(" ")[0] || "")}</div>
          <div class="header-school">${escapeHTML(state.school)}</div>
        </div>
      </div>
      ${crumbsHTML}
      ${body}
    </div>
    ${state.showKeyModal ? `
      <div class="key-modal" id="key-modal">
        <div class="key-modal-card">
          <div class="key-modal-title">Add your Gemini API key</div>
          <div class="key-modal-sub">Needed to generate notes. Get a free key at aistudio.google.com/apikey — it starts with "AIza". It's stored only on this device.</div>
          <input id="key-input" type="password" placeholder="AIza..." value="${escapeHTML(apiKey)}" autocomplete="off" />
          <div class="key-modal-actions">
            <button class="key-cancel" id="key-cancel">Cancel</button>
            <button class="key-save" id="key-save">Save</button>
          </div>
          <div class="key-modal-note">Your key is used only for requests from this page and never leaves your device except to call Google's Gemini API directly.</div>
        </div>
      </div>` : ""}
  `;

  attachHandlers();
}

function canEnter(){
  return state.name.trim() && state.mobile.trim() && state.school.trim();
}

function attachHandlers(){
  document.querySelectorAll(".crumb-btn.enabled").forEach(btn => {
    btn.addEventListener("click", () => {
      const jump = parseInt(btn.dataset.jump, 10);
      if (jump === 0) { state.subject = null; state.chapter = null; state.stage = "class"; }
      else if (jump === 1) { state.chapter = null; state.stage = "subject"; }
      else if (jump === 2) { state.stage = "chapter"; }
      render();
    });
  });

  document.querySelectorAll("[data-class]").forEach(btn => {
    btn.addEventListener("click", () => {
      state.cls = parseInt(btn.dataset.class, 10);
      state.subject = null; state.chapter = null;
      state.stage = "subject";
      render();
    });
  });

  document.querySelectorAll("[data-subject]").forEach(btn => {
    btn.addEventListener("click", () => {
      state.subject = btn.dataset.subject;
      state.chapter = null;
      state.stage = "chapter";
      render();
    });
  });

  document.querySelectorAll("[data-chapter]").forEach(btn => {
    btn.addEventListener("click", () => {
      state.chapter = btn.dataset.chapter;
      render();
    });
  });

  const genBtn = document.getElementById("btn-generate");
  if (genBtn) genBtn.addEventListener("click", generateNotes);

  const retryBtn = document.getElementById("btn-retry");
  if (retryBtn) retryBtn.addEventListener("click", generateNotes);

  const regenBtn = document.getElementById("btn-regenerate");
  if (regenBtn) regenBtn.addEventListener("click", generateNotes);

  const backBtn = document.getElementById("btn-back-chapters");
  if (backBtn) backBtn.addEventListener("click", () => { state.stage = "chapter"; render(); });

  const keyBtn = document.getElementById("btn-key");
  if (keyBtn) keyBtn.addEventListener("click", () => { state.showKeyModal = true; render(); });

  const keyCancel = document.getElementById("key-cancel");
  if (keyCancel) keyCancel.addEventListener("click", () => { state.showKeyModal = false; render(); });

  const keySave = document.getElementById("key-save");
  if (keySave) keySave.addEventListener("click", () => {
    const input = document.getElementById("key-input");
    const val = input ? input.value.trim() : "";
    if (!val) return;
    apiKey = val;
    try { localStorage.setItem("infimind_gemini_key", apiKey); } catch (e) {}
    state.showKeyModal = false;
    const wasWaitingToGenerate = state.stage === "notes" && !state.notesText && !state.loading;
    render();
    if (wasWaitingToGenerate) generateNotes();
  });
}

/* ---------------- AI call ---------------- */
async function generateNotes(){
  if (!apiKey) {
    state.stage = "notes";
    state.showKeyModal = true;
    state.error = "";
    state.notesText = "";
    render();
    return;
  }

  const key = `${state.cls}-${state.subject}-${state.chapter}`;
  state.stage = "notes";
  state.error = "";

  if (cache[key]) {
    state.notesText = cache[key];
    state.loading = false;
    render();
    return;
  }

  state.loading = true;
  state.notesText = "";
  render();

  const prompt = `Create exam-ready study notes for a CBSE Class ${state.cls} student, NCERT syllabus, subject "${state.subject}", chapter "${state.chapter}".

Format in markdown using this structure:
# ${state.chapter}
## Overview
A short 2-3 sentence framing of what the chapter covers and why it matters.
## Key Concepts
Bulleted, precise explanations of every major concept, law, or process in the chapter.
## Important Formulas / Definitions
(if applicable — formulas, definitions, equations, one per line, clearly labelled)
## Diagrams to Remember
(brief text description of any diagram a student should be able to draw/label)
## Quick Revision Points
A tight bulleted list for last-minute revision.
## Likely Exam Questions
3-5 questions typical of CBSE board exams for this chapter.

Keep it accurate to the NCERT textbook, well organised, and genuinely useful for revision — not generic filler.`;

  try {
    const model = "gemini-2.5-flash"; // stable, widely available flash model
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`,
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-goog-api-key": apiKey
        },
        body: JSON.stringify({
          systemInstruction: {
            parts: [{ text: "You are an expert CBSE/NCERT subject teacher who writes crisp, accurate, exam-focused revision notes." }]
          },
          contents: [{ role: "user", parts: [{ text: prompt }] }],
          generationConfig: { maxOutputTokens: 4096, temperature: 0.6 }
        })
      }
    );
    if (!response.ok) {
      let msg = "Couldn't generate notes right now. Please try again.";
      if (response.status === 400 || response.status === 401 || response.status === 403) {
        msg = "That API key was rejected. Tap the key icon to update it.";
      } else if (response.status === 429) {
        msg = "Rate limited — please wait a moment and try again.";
      }
      state.error = msg;
      state.loading = false;
      render();
      return;
    }
    const data = await response.json();
    const candidate = (data.candidates || [])[0];
    const text = candidate && candidate.content && candidate.content.parts
      ? candidate.content.parts.map(p => p.text || "").filter(Boolean).join("\n")
      : "";
    if (!text) throw new Error("empty");
    cache[key] = text;
    state.notesText = text;
  } catch (e) {
    state.error = "Couldn't generate notes right now. Please try again.";
  } finally {
    state.loading = false;
    render();
  }
}

render();
</script>
